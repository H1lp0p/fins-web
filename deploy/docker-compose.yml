services:
  bff:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.bff
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.nginx
    ports:
      - "8080:80"
    depends_on:
      bff:
        condition: service_healthy
