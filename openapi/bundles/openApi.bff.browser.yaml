        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /credit-service/credit_rule/{creditRuleId}/delete:
    delete:
      tags:
      - credit-rule-controller
      operationId: deleteCreditRule
      parameters:
      - name: creditRuleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /credit-service/credit/{creditId}/delete:
    delete:
      tags:
      - credit-controller
      operationId: deleteCredit
      parameters:
      - name: creditId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /preferences-service/preferences:
    get:
      tags:
      - preferences-controller
      operationId: getPreferences
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferencesDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
      - preferences-controller
      operationId: updatePreferences
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferencesDto'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferencesDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /user-service/auth/revoke:
    post:
      tags:
      - Auth
      operationId: authRevoke
      security:
      - BffSessionCookie: []
      description: 'Завершение сессии на BFF по httpOnly-куке; тело запроса не требуется.

        '
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /user-service/auth/register:
    post:
      tags:
      - Auth
      operationId: authRegister
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoRegisterBody'
        required: true
      responses:
        '200':
          description: 'Успешная регистрация: BFF выставляет сессионные httpOnly-куки; тело ответа без JWT (JWT остаётся на
            уровне BFF ↔ шлюз).

            '
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /user-service/auth/login:
    post:
      tags:
      - Auth
      operationId: authLogin
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoLoginBody'
        required: true
      responses:
        '200':
          description: 'Успешный вход: BFF выставляет сессионные httpOnly-куки; тело ответа без JWT.

            '
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /user-service/auth/validate:
    get:
      tags:
      - Auth
      operationId: authValidateSession
      security:
      - BffSessionCookie: []
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    Currency:
      type: string
      enum:
      - DOLLAR
      - EURO
      - RUBLE
      default: RUBLE
    MoneyValueDto:
      type: object
      properties:
        value:
          type: number
        currency:
          $ref: '#/components/schemas/Currency'
    UserPreferencesDto:
      type: object
      properties:
        theme:
          type: string
        hiddenAccounts:
          uniqueItems: true
          type: array
          items:
            type: string
    UserEditModelDto:
      required:
      - name
      type: object
      properties:
        name:
          type: string
        newRoles:
          description: 'Новый набор ролей. Пустой массив снимает все роли (пользователь может остаться без ролей). Несколько
            ролей одновременно допустимы (например CLIENT и WORKER).

            '
          uniqueItems: true
          type: array
          minItems: 0
          items:
            type: string
            enum:
            - CLIENT
            - WORKER
        active:
          type: boolean
          description: 'При указании — выставить флаг активности пользователя (доступ / блокировка).

            '
    UserDto:
      required:
      - email
      - id
      - name
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        roles:
          description: 'Роли пользователя. Может быть пустым: у пользователя может не быть ни одной роли. Значения CLIENT
            и WORKER не взаимоисключающие — допустимы оба одновременно.

            '
          uniqueItems: true
          type: array
          minItems: 0
          items:
            type: string
            enum:
            - CLIENT
            - WORKER
            - BLOCKED_CLIENT
            - BLOCKED_WORKER
        active:
          type: boolean
    UserDirectoryEntryDto:
      required:
      - userId
      - username
      - mainAccountCurrency
      type: object
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        mainAccountCurrency:
          $ref: '#/components/schemas/Currency'
    BankTreasuryBalanceItem:
      required:
      - cardAccountId
      - balance
      type: object
      properties:
        cardAccountId:
          type: string
          format: uuid
        balance:
          $ref: '#/components/schemas/MoneyValueDto'
    BankTreasuryBalancesDto:
      required:
      - accounts
      type: object
      description: Три счёта казначейства в порядке DOLLAR, EURO, RUBLE.
      properties:
        accounts:
          type: array
          minItems: 3
          maxItems: 3
          items:
            $ref: '#/components/schemas/BankTreasuryBalanceItem'
    WithdrawDto:
      type: object
      properties:
        cardAccountId:
          type: string
          format: uuid
        sum:
          type: number
        destination:
          type: string
    EnrollDto:
      type: object
      properties:
        cardAccountId:
          type: string
          format: uuid
        money:
          $ref: '#/components/schemas/MoneyValueDto'
        destination:
          type: string
    TransferMoneyDto:
      type: object
      required:
      - amount
      - amountCurrency
      - targetKind
      properties:
        fromCardAccountId:
          type: string
          format: uuid
          nullable: true
          description: Счёт списания; null — зачисление только с внешнего источника
        amount:
          type: number
          description: Сумма в валюте amountCurrency
        amountCurrency:
          $ref: '#/components/schemas/Currency'
        targetKind:
          type: string
          enum:
          - ACCOUNT
          - CREDIT
          description: Тип получателя
        targetCardAccountId:
          type: string
          format: uuid
          nullable: true
          description: Обязателен при targetKind=ACCOUNT
        targetCreditId:
          type: string
          format: uuid
          nullable: true
          description: Обязателен при targetKind=CREDIT
    CardAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
          description: Отображаемое имя счёта
        main:
          type: boolean
          description: Главный счёт пользователя
        visible:
          type: boolean
          description: Видимость в списках (false = hidden)
        money:
          $ref: '#/components/schemas/MoneyValueDto'
        deleted:
          type: boolean
        transactionOperations:
          type: array
          items:
            $ref: '#/components/schemas/TransactionOperation'
    AccountSetVisibilityDto:
      type: object
      required:
      - visible
      properties:
        visible:
          type: boolean
    CardAccountCreateModelDto:
      type: object
      properties:
        name:
          type: string
        currency:
          $ref: '#/components/schemas/Currency'
    TransactionOperation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        cardAccountId:
          type: string
          format: uuid
        dateTime:
          type: string
          format: date-time
        transactionType:
          type: string
          enum:
          - WITHDRAWAL
          - ENROLLMENT
        transactionActoin:
          type: string
        transactionStatus:
          type: string
          enum:
          - COMPLETE
          - IN_PROGRESS
          - DECLINED
        money:
          $ref: '#/components/schemas/MoneyValueDto'
    PageTransactionOperation:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/TransactionOperation'
        number:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        numberOfElements:
          type: integer
          format: int32
        first:
          type: boolean
        last:
          type: boolean
        pageable:
          $ref: '#/components/schemas/PageableObject'
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          $ref: '#/components/schemas/SortObject'
        paged:
          type: boolean
        unpaged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
    PageCardAccount:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/CardAccount'
        number:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        numberOfElements:
          type: integer
          format: int32
        first:
          type: boolean
        last:
          type: boolean
        pageable:
          $ref: '#/components/schemas/PageableObject'
        empty:
          type: boolean
    CreditRuleDTO:
      type: object
      properties:
        percentageStrategy:
          type: string
          enum:
          - FROM_REMAINING_DEBT
          - FROM_TOTAL_DEBT
        collectionPeriodSeconds:
          type: integer
          format: int32
        openingDate:
          type: string
          format: date-time
        ruleName:
          type: string
        percentage:
          type: number
    CreditRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        percentageStrategy:
          type: string
          enum:
          - FROM_REMAINING_DEBT
          - FROM_TOTAL_DEBT
        collectionPeriodSeconds:
          type: integer
          format: int32
        openingDate:
          type: string
          format: date-time
        ruleName:
          type: string
        percentage:
          type: number
    Credit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        cardAccount:
          type: string
          format: uuid
        lastInterestUpdate:
          type: string
          format: date-time
        currentDebtSum:
          type: number
        initialDebt:
          type: number
        interestDebtSum:
          type: number
        currency:
          $ref: '#/components/schemas/Currency'
        creditRule:
          $ref: '#/components/schemas/CreditRule'
    CreditCreateModelDto:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        cardAccount:
          type: string
          format: uuid
        creditRuleId:
          type: string
          format: uuid
        money:
          $ref: '#/components/schemas/MoneyValueDto'
    BffErrorBody:
      type: object
      description: Обобщённое тело ошибки (BFF/шлюз; фактический JSON может отличаться).
      properties:
        message:
          type: string
        code:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    SsoRegisterBody:
      required:
      - email
      - name
      - password
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          maxLength: 255
          minLength: 6
          type: string
    SsoLoginBody:
      required:
      - email
      - password
      type: object
      properties:
        email:
          type: string
        password:
          maxLength: 255
          minLength: 6
          type: string
  responses:
    BadRequest:
      description: Некорректный запрос (синтаксис, параметры пути/запроса).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
    Unauthorized:
      description: Нет или недействительная аутентификация (сессия, JWT, API-ключ).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
    Forbidden:
      description: Доступ запрещён (недостаточно прав).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
    NotFound:
      description: Ресурс не найден.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
    UnprocessableEntity:
      description: Ошибка валидации тела запроса или бизнес-правил.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
    InternalServerError:
      description: Внутренняя ошибка сервера.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
  securitySchemes:
    BffSessionCookie:
      type: apiKey
      in: cookie
      name: fins_session
      description: 'Сессия браузера с BFF: httpOnly (и при необходимости Secure / SameSite) — имя куки задаёт BFF. Плейсхолдер
        `fins_session` замените на фактическое имя в своём BFF. Браузер не получает JWT бекенда.

        '
    BffServiceApiKey:
      type: apiKey
      in: header
      name: X-API-KEY
      description: Сервисный ключ BFF при вызове internal-маршрутов (не сессия пользователя).
