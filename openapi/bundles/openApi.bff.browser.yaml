  /core-api/transactions/transfer:
    post:
      tags:
      - transaction-operation-controller
      operationId: transferMoney
      summary: Перевод между счётами или на погашение кредита
      description: 'Сумма `amount` в валюте `amountCurrency`. BFF конвертирует в валюты сторон. При указанном `fromCardAccountId`
        — списание со счёта (withdraw в истории, action Transaction или payback). Зачисление на цель — enroll в истории целевого
        счёта. Без `fromCardAccountId` — только зачисление с внешнего источника.

        '
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferMoneyDto'
        required: true
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
