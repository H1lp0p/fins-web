        dateTime:
          type: string
          format: date-time
        transactionType:
          type: string
          enum:
            - WITHDRAWAL
            - ENROLLMENT
        transactionStatus:
          type: string
          enum:
            - COMPLETE
            - IN_PROGRESS
            - DECLINED
        money:
          type: number
    PageTransactionOperation:
      type: object
      properties:
