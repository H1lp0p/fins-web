openapi: 3.0.1
info:
  title: Bank API
  description: >
    Полный контракт шлюза (источник правды). Сплиты без потери путей: openApi.public.yaml + openApi.sso.yaml.
    Исправлена опечатка типа number в схеме Credit (currentDebtSum, interestDebtSum).
  version: "1.0"
servers:
  - url: http://localhost:8000/api
    description: Bank API Gateway
security:
  - JWT: []
