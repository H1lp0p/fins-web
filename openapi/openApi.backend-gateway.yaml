    BffErrorBody:
      type: object
      description: Обобщённое тело ошибки (BFF/шлюз; фактический JSON может отличаться).
      properties:
        message:
          type: string
        code:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
  responses:
    BadRequest:
      description: Некорректный запрос (синтаксис, параметры пути/запроса).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
    Unauthorized:
      description: Нет или недействительная аутентификация (сессия, JWT, API-ключ).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
    Forbidden:
      description: Доступ запрещён (недостаточно прав).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
    UnprocessableEntity:
      description: Ошибка валидации тела запроса или бизнес-правил.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
    InternalServerError:
      description: Внутренняя ошибка сервера.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BffErrorBody'
  securitySchemes:
    JWT:
      type: http
      name: JWT
      scheme: bearer
      bearerFormat: JWT
