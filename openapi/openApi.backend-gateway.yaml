    # User Service Schemas
    UserEditModelDto:
      required:
        - name
      type: object
      properties:
        name:
          type: string
        newRoles:
          description: >
            Новый набор ролей. Пустой массив снимает все роли (пользователь может остаться без ролей).
            Несколько ролей одновременно допустимы (например CLIENT и WORKER).
          uniqueItems: true
          type: array
          minItems: 0
          items:
            type: string
            enum:
            - CLIENT
            - WORKER
    TokenRefreshModelDto:
      required:
        - value
      type: object
      properties:
        value:
          type: string
    RegisterModelDto:
      required:
        - email
        - name
        - password
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          maxLength: 255
          minLength: 6
          type: string
    JwtModelDto:
      required:
        - accessToken
        - refreshToken
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    LoginModelDto:
      required:
        - email
        - password
      type: object
      properties:
        email:
          type: string
        password:
          maxLength: 255
          minLength: 6
          type: string
    UserDto:
      required:
        - email
        - id
        - name
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        roles:
          description: >
            Роли пользователя. Может быть пустым: у пользователя может не быть ни одной роли.
            Значения CLIENT и WORKER не взаимоисключающие — допустимы оба одновременно.
          uniqueItems: true
          type: array
          minItems: 0
          items:
            type: string
            enum:
              - CLIENT
              - WORKER
              - BLOCKED_CLIENT
              - BLOCKED_WORKER
        active:
          type: boolean
    UserDirectoryEntryDto:
      required:
        - userId
        - username
        - mainAccountCurrency
      type: object
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        mainAccountCurrency:
          $ref: '#/components/schemas/Currency'
    # Core API Schemas
    WithdrawDto:
