            - FROM_TOTAL_DEBT
        collectionPeriodSeconds:
          type: integer
          format: int32
        openingDate:
          type: string
          format: date-time
        ruleName:
          type: string
        percentage:
          type: number
    CreditRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        percentageStrategy:
          type: string
          enum:
            - FROM_REMAINING_DEBT
            - FROM_TOTAL_DEBT
        collectionPeriodSeconds:
          type: integer
          format: int32
        openingDate:
          type: string
          format: date-time
        ruleName:
          type: string
        percentage:
          type: number
    Credit:
      type: object
      properties:
